<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Personal Oracle</title>
    <link rel="apple-touch-icon" href="icon.jpeg">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@700&display=swap');
        .serif { font-family: 'Noto Serif JP', serif; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* フリップカード */
        .flip-card {
            perspective: 800px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 88px;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }
        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }
        .flip-card-front,
        .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        .flip-card-front {
            background: #f5f5f4;
        }
        .flip-card-back {
            background: #1c1917;
            transform: rotateY(180deg);
        }
        .flip-hint {
            position: absolute;
            bottom: 6px;
            right: 8px;
            font-size: 8px;
            opacity: 0.3;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body class="bg-stone-50 min-h-screen flex flex-col items-center p-4 text-slate-800">

    <div id="setup-view" class="w-full max-w-md mt-20 hidden bg-white p-8 rounded-[2.5rem] shadow-xl border border-stone-100">
        <h2 class="text-xl font-bold mb-2 serif">System Setup</h2>
        <p class="text-[11px] text-stone-400 mb-8 tracking-widest uppercase">Gemini API Key Required</p>
        <input type="password" id="api-key" class="w-full border-b border-stone-200 p-2 mb-10 focus:border-stone-800 outline-none transition-colors" placeholder="APIキーを入力">
        <button onclick="saveKey()" class="w-full bg-stone-800 text-white py-4 rounded-2xl font-bold active:scale-95 transition">保存して開始</button>
    </div>

    <div id="main-view" class="w-full max-w-md hidden">
        <header class="py-10 text-center">
            <h1 class="text-xs serif tracking-[0.6em] text-stone-400 uppercase">Daily Insight</h1>
            <p class="text-[10px] text-stone-300 mt-2">Personalized for 1983.09.13</p>
        </header>

        <div id="display-area">
            <div id="idle-state" class="text-center py-24 bg-white rounded-[3rem] shadow-sm border border-stone-100">
                <div class="text-2xl mb-6 opacity-30">── 🕯️ ──</div>
                <button onclick="fetchFortune()" class="px-12 py-4 bg-stone-800 text-white rounded-full text-xs font-bold tracking-[0.2em] active:scale-95 transition shadow-lg shadow-stone-200">鑑定を開始する</button>
            </div>
        </div> <div id="tarot-section" class="mt-8 text-center border-t border-stone-100 pt-8">
            <button onclick="drawTarot()" class="px-6 py-2 border border-stone-300 text-stone-400 rounded-full text-[9px] tracking-[0.2em] active:scale-95 transition uppercase font-bold">
                Draw a Card (運試し)
            </button>
            <div id="tarot-display" class="mt-6 flex justify-center min-h-[160px]">
                </div>
        </div>

        <div id="loader" class="hidden text-center py-24">
            <div class="inline-block w-5 h-5 border-2 border-stone-200 border-t-stone-800 rounded-full animate-spin mb-4"></div>
            <p class="text-[10px] text-stone-400 tracking-[0.3em] uppercase">Calculating...</p>
        </div>

        <footer class="mt-12 text-center opacity-30">
            <button onclick="resetKey()" class="text-[9px] underline tracking-widest uppercase">Reset Key</button>
        </footer>
    </div>

    <script>
        const KEY_NAME = 'fixed_oracle_key_v2';
        const PROFILE = {
            birth: "1983-09-13",
            hachiku: "年柱:癸亥, 月柱:辛酉, 日柱:甲辰",
            suimei: "日干:甲(木), 旺衰:中和(+1), 月柱蔵干通変星:偏官, 十二運:衰, 地支:酉(金)",
            num: "ライフパスナンバー:7",
            others: "六星占術:金星人(+), 九星気学:八白土星"
        };

        window.onload = () => {
            if (!localStorage.getItem(KEY_NAME)) {
                document.getElementById('setup-view').classList.remove('hidden');
            } else {
                document.getElementById('main-view').classList.remove('hidden');
            }
        };

        function saveKey() {
            const val = document.getElementById('api-key').value.trim();
            if (val) { localStorage.setItem(KEY_NAME, val); location.reload(); }
        }

        function resetKey() {
            if (confirm('設定をリセットしますか？')) { localStorage.removeItem(KEY_NAME); location.reload(); }
        }

        function toggleFlip(el) {
            el.classList.toggle('flipped');
        }

        async function fetchFortune() {
            const apiKey = localStorage.getItem(KEY_NAME);
            const idle = document.getElementById('idle-state');
            const loader = document.getElementById('loader');

            idle.classList.add('hidden');
            loader.classList.remove('hidden');

            const today = new Date().toLocaleDateString('ja-JP');

            const payload = {
                contents: [{ parts: [{ text: `
                    あなたは熟練の東洋占術師です。以下のデータを基に本日（${today}）の運勢を鑑定してください。
                    【相談者データ】${JSON.stringify(PROFILE)}
                    【指示】
                    ・簡潔に、かつ知的に回答せよ。過度な励ましや全肯定は不要。
                    ・今日をどういう気持ちで過ごすべきか、一言アドバイスを添えよ。
                    ・以下のJSON形式のみで出力せよ（余計な文章は一切含めないこと）。
                    {"score":0-100, "love":0-100, "work":0-100, "love_comment":"恋愛・対人運の解説(40字以内)", "work_comment":"仕事・金運の解説(40字以内)", "color":"色", "direction":"方位", "message":"今日の運勢一言(80字以内)", "advice":"過ごし方の助言(80字以内)"}
                ` }] }]
            };

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;

                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const resJson = await response.json();

                if (!response.ok) {
                    throw new Error(resJson.error ? resJson.error.message : "API通信エラー");
                }

                const aiText = resJson.candidates[0].content.parts[0].text;
                const jsonMatch = aiText.match(/\{[\s\S]*\}/);
                render(JSON.parse(jsonMatch[0]));

            } catch (e) {
                console.error("Error:", e);
                alert(`鑑定エラー: ${e.message}\n\nAPIキーを確認して「Reset Key」から再入力してください。`);
                idle.classList.remove('hidden');
            } finally {
                loader.classList.add('hidden');
            }
        }

        function render(d) {
            document.getElementById('display-area').innerHTML = `
                <div class="bg-white p-10 rounded-[3.5rem] shadow-xl border border-stone-50 fade-in">
                    <div class="flex justify-between items-start mb-12">
                        <div class="serif text-7xl text-slate-900">${d.score}<span class="text-sm ml-1 opacity-30">/100</span></div>
                        <div class="flex flex-col gap-2 w-[48%]">

                            <div class="flip-card" onclick="toggleFlip(this)">
                                <div class="flip-card-inner">
                                    <div class="flip-card-front">
                                        <p class="text-[9px] text-stone-400 uppercase tracking-widest mb-1">Love</p>
                                        <p class="text-sm font-bold text-slate-700">${d.love}%</p>
                                        <span class="flip-hint">tap ↺</span>
                                    </div>
                                    <div class="flip-card-back">
                                        <p class="text-[9px] text-stone-400 uppercase tracking-widest mb-1">Love</p>
                                        <p class="text-[10px] text-stone-300 leading-relaxed text-center">${d.love_comment || '—'}</p>
                                    </div>
                                </div>
                            </div>

                            <div class="flip-card" onclick="toggleFlip(this)">
                                <div class="flip-card-inner">
                                    <div class="flip-card-front">
                                        <p class="text-[9px] text-stone-400 uppercase tracking-widest mb-1">Work</p>
                                        <p class="text-sm font-bold text-slate-700">${d.work}%</p>
                                        <span class="flip-hint">tap ↺</span>
                                    </div>
                                    <div class="flip-card-back">
                                        <p class="text-[9px] text-stone-400 uppercase tracking-widest mb-1">Work</p>
                                        <p class="text-[10px] text-stone-300 leading-relaxed text-center">${d.work_comment || '—'}</p>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>
                    <div class="space-y-10">
                        <div class="text-sm leading-relaxed text-slate-600 serif pl-4 border-l border-stone-200">
                            ${d.message}
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div class="bg-stone-50 p-4 rounded-2xl text-center">
                                <p class="text-[9px] text-stone-400 uppercase tracking-widest mb-1">Color</p>
                                <p class="font-bold text-xs">${d.color}</p>
                            </div>
                            <div class="bg-stone-50 p-4 rounded-2xl text-center">
                                <p class="text-[9px] text-stone-400 uppercase tracking-widest mb-1">Direction</p>
                                <p class="font-bold text-xs">${d.direction}</p>
                            </div>
                        </div>
                        <div class="pt-8 border-t border-stone-100">
                            <p class="text-[9px] text-stone-400 font-bold mb-3 uppercase tracking-[0.2em]">Mindset Advice</p>
                            <p class="text-sm font-bold text-slate-700 leading-relaxed">${d.advice}</p>
                        </div>
                    </div>
                    <div class="mt-10 text-center">
                        <button onclick="location.reload()" class="px-8 py-3 border border-stone-200 rounded-full text-[10px] tracking-widest uppercase text-stone-400 active:scale-95 transition">再鑑定する</button>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
