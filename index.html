<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Personal Oracle</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="apple-touch-icon" href="icon.jpeg">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@700&family=Cinzel:wght@400;700&display=swap');
        .serif { font-family: 'Noto Serif JP', serif; }
        .cinzel { font-family: 'Cinzel', serif; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .flip-card { perspective: 800px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .flip-card-inner { position: relative; width: 100%; height: 88px; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
        .flip-card-front, .flip-card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; -webkit-backface-visibility: hidden; border-radius: 1rem; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 12px; }
        .flip-card-front { background: #f5f5f4; }
        .flip-card-back { background: #1c1917; transform: rotateY(180deg); }
        .flip-hint { position: absolute; bottom: 6px; right: 8px; font-size: 8px; opacity: 0.3; letter-spacing: 0.05em; }
        .tarot-flip { perspective: 1000px; }
        .tarot-flip-inner { position: relative; width: 160px; height: 260px; transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .tarot-flip-inner.revealed { transform: rotateY(180deg); }
        .tarot-face, .tarot-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; -webkit-backface-visibility: hidden; border-radius: 12px; overflow: hidden; }
        .tarot-face { transform: rotateY(180deg); }
    </style>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-stone-50 min-h-screen flex flex-col items-center p-4 text-slate-800">

    <div id="setup-view" class="w-full max-w-md mt-20 hidden bg-white p-8 rounded-[2.5rem] shadow-xl border border-stone-100">
        <h2 class="text-xl font-bold mb-2 serif">System Setup</h2>
        <p class="text-[11px] text-stone-400 mb-8 tracking-widest uppercase">Gemini API Key Required</p>
        <input type="password" id="api-key" class="w-full border-b border-stone-200 p-2 mb-10 focus:border-stone-800 outline-none transition-colors" placeholder="APIキーを入力">
        <button onclick="saveKey()" class="w-full bg-stone-800 text-white py-4 rounded-2xl font-bold active:scale-95 transition">保存して開始</button>
    </div>

    <div id="main-view" class="w-full max-w-md hidden">
        <header class="py-10 text-center">
            <h1 class="text-xs serif tracking-[0.6em] text-stone-400 uppercase">Daily Insight</h1>
            <p class="text-[10px] text-stone-300 mt-2">Personalized for 1983.09.13</p>
        </header>

        <div id="display-area">
            <div id="idle-state" class="text-center py-24 bg-white rounded-[3rem] shadow-sm border border-stone-100">
                <div class="flex items-center justify-center gap-4 mb-8 opacity-40">
    <div class="h-[1px] w-8 bg-stone-400"></div>
    <i data-lucide="candle" class="w-5 h-5 text-stone-600 stroke-[1.5px]"></i>
    <div class="h-[1px] w-8 bg-stone-400"></div>
</div>
                <button onclick="fetchFortune()" class="px-12 py-4 bg-stone-800 text-white rounded-full text-xs font-bold tracking-[0.2em] active:scale-95 transition shadow-lg shadow-stone-200">鑑定を開始する</button>
            </div>
        </div>

        <div id="tarot-section" class="mt-10 text-center border-t border-stone-100 pt-8">
            <p class="text-[9px] text-stone-300 tracking-[0.3em] uppercase mb-6">Tarot — Draw a Card</p>
            <div class="flex justify-center mb-6">
                <div class="tarot-flip">
                    <div class="tarot-flip-inner" id="tarot-inner">
                        <div class="tarot-back shadow-xl shadow-stone-200">
                            <svg viewBox="0 0 160 260" xmlns="http://www.w3.org/2000/svg" width="160" height="260">
                                <rect width="160" height="260" rx="12" fill="#1a1025"/>
                                <rect x="8" y="8" width="144" height="244" rx="9" fill="none" stroke="#4a3060" stroke-width="1"/>
                                <rect x="13" y="13" width="134" height="234" rx="7" fill="none" stroke="#2e1d45" stroke-width="0.5"/>
                                <g transform="translate(80,130)">
                                    <polygon points="0,-38 8,-14 34,-14 13,3 22,28 0,13 -22,28 -13,3 -34,-14 -8,-14" fill="none" stroke="#7c5cbf" stroke-width="0.8" opacity="0.6"/>
                                    <circle cx="0" cy="0" r="22" fill="none" stroke="#5a3d8a" stroke-width="0.6" opacity="0.5"/>
                                    <circle cx="0" cy="0" r="8" fill="#3d2660" stroke="#7c5cbf" stroke-width="0.5"/>
                                    <circle cx="0" cy="0" r="3" fill="#9b7fd4" opacity="0.8"/>
                                    <line x1="0" y1="-28" x2="0" y2="-42" stroke="#5a3d8a" stroke-width="0.5" opacity="0.4"/>
                                    <line x1="0" y1="28" x2="0" y2="42" stroke="#5a3d8a" stroke-width="0.5" opacity="0.4"/>
                                    <line x1="-28" y1="0" x2="-42" y2="0" stroke="#5a3d8a" stroke-width="0.5" opacity="0.4"/>
                                    <line x1="28" y1="0" x2="42" y2="0" stroke="#5a3d8a" stroke-width="0.5" opacity="0.4"/>
                                    <circle cx="0" cy="-50" r="1.5" fill="#9b7fd4" opacity="0.5"/>
                                    <circle cx="0" cy="50" r="1.5" fill="#9b7fd4" opacity="0.5"/>
                                    <circle cx="-50" cy="0" r="1.5" fill="#9b7fd4" opacity="0.5"/>
                                    <circle cx="50" cy="0" r="1.5" fill="#9b7fd4" opacity="0.5"/>
                                </g>
                                <g opacity="0.4" stroke="#5a3d8a" stroke-width="0.7" fill="none">
                                    <path d="M22,22 L32,22 L32,32"/>
                                    <path d="M138,22 L128,22 L128,32"/>
                                    <path d="M22,238 L32,238 L32,228"/>
                                    <path d="M138,238 L128,238 L128,228"/>
                                </g>
                                <text x="80" y="248" text-anchor="middle" font-family="serif" font-size="7" fill="#4a3060" letter-spacing="4">ORACLE</text>
                            </svg>
                        </div>
                        <div class="tarot-face shadow-xl shadow-stone-300" id="tarot-face-content"></div>
                    </div>
                </div>
            </div>
            <div id="tarot-message" class="min-h-[40px] px-4"></div>
            <button onclick="drawTarot()" id="tarot-btn" class="mt-4 px-8 py-3 border border-stone-200 text-stone-400 rounded-full text-[9px] tracking-[0.25em] active:scale-95 transition uppercase font-bold cinzel">Draw</button>
        </div>

        <div id="loader" class="hidden text-center py-24">
            <div class="inline-block w-5 h-5 border-2 border-stone-200 border-t-stone-800 rounded-full animate-spin mb-4"></div>
            <p class="text-[10px] text-stone-400 tracking-[0.3em] uppercase">Calculating...</p>
        </div>

        <footer class="mt-12 text-center opacity-30">
            <button onclick="resetKey()" class="text-[9px] underline tracking-widest uppercase">Reset Key</button>
        </footer>
    </div>

    <script>
        const KEY_NAME = 'fixed_oracle_key_v2';
        const PROFILE = {
            birth: "1983-09-13",
            hachiku: "年柱:癸亥, 月柱:辛酉, 日柱:甲辰",
            suimei: "日干:甲(木), 旺衰:中和(+1), 月柱蔵干通変星:偏官, 十二運:衰, 地支:酉(金)",
            num: "ライフパスナンバー:7",
            others: "六星占術:金星人(+), 九星気学:八白土星"
        };

        const ARCANA_SYMBOLS = {
            "愚者":      { glyph: "wind", color: "#f0e6c8", accent: "#c8a84b" },
            "魔術師":    { glyph: "sparkles", color: "#f0e6c8", accent: "#c8a84b" },
            "女教皇":    { glyph: "moon", color: "#d4e0f0", accent: "#4b6ea8" },
            "女帝":      { glyph: "flower-2", color: "#e8f0d4", accent: "#6a9048" },
            "皇帝":      { glyph: "crown", color: "#f0ddd4", accent: "#a85030" },
            "教皇":      { glyph: "shield-check", color: "#f0e6c8", accent: "#8a6020" },
            "恋人":      { glyph: "heart", color: "#f0d4e0", accent: "#c84870" },
            "戦車":      { glyph: "move-up-right", color: "#d4e0f0", accent: "#304880" },
            "力":        { glyph: "zap", color: "#f0e6c8", accent: "#b87820" },
            "隠者":      { glyph: "lamp", color: "#d8d4e8", accent: "#604888" },
            "運命の輪":  { glyph: "refresh-cw", color: "#f0e6c8", accent: "#c8a84b" },
            "正義":      { glyph: "scale", color: "#d4e0f0", accent: "#304860" },
            "吊られた男":{ glyph: "anchor", color: "#d4e8e0", accent: "#306858" },
            "死神":      { glyph: "skull", color: "#e0dcd4", accent: "#605040" },
            "節制":      { glyph: "droplets", color: "#d4e0f0", accent: "#4060a0" },
            "悪魔":      { glyph: "flame", color: "#e8d4d4", accent: "#882020" },
            "塔":        { glyph: "zap-off", color: "#f0ddd4", accent: "#a84020" },
            "星":        { glyph: "star", color: "#d4dce8", accent: "#405888" },
            "月":        { glyph: "moon-star", color: "#d8d4e8", accent: "#504878" },
            "太陽":      { glyph: "sun", color: "#f8f0c8", accent: "#c88820" },
            "審判":      { glyph: "bell", color: "#e8ecd4", accent: "#506830" },
            "世界":      { glyph: "globe", color: "#d4e0e8", accent: "#305868" },
        };
        
        function getSymbol(cardName) {
            for (const [key, val] of Object.entries(ARCANA_SYMBOLS)) {
                if (cardName.includes(key)) return val;
            }
            return { glyph: "✦", color: "#f0e6c8", accent: "#c8a84b" };
        }

        function buildCardSVG(cardName, isReversed, iconName) {
            const sym = getSymbol(cardName);
            // AIが選んだアイコンがあればそれを使う。なければデフォルトの絵柄。
            const glyph = iconName || sym.glyph;
            const rotation = isReversed ? 'transform="rotate(180, 80, 130)"' : '';
            return `<svg viewBox="0 0 160 260" xmlns="http://www.w3.org/2000/svg" width="160" height="260">
                <rect width="160" height="260" rx="12" fill="${sym.color}"/>
                <rect x="7" y="7" width="146" height="246" rx="9" fill="none" stroke="${sym.accent}" stroke-width="0.8" opacity="0.5"/>
                <rect x="12" y="12" width="136" height="236" rx="7" fill="none" stroke="${sym.accent}" stroke-width="0.4" opacity="0.3"/>
                <g ${rotation}>
                    <rect x="28" y="18" width="104" height="14" rx="3" fill="${sym.accent}" opacity="0.12"/>
                    <text x="80" y="28" text-anchor="middle" font-family="'Noto Serif JP', serif" font-size="7.5" fill="${sym.accent}" letter-spacing="1" opacity="0.8">${cardName}</text>
                    <circle cx="80" cy="130" r="46" fill="${sym.accent}" opacity="0.07"/>
                    <circle cx="80" cy="130" r="38" fill="none" stroke="${sym.accent}" stroke-width="0.6" opacity="0.3"/>
                    
                    <foreignObject x="40" y="90" width="80" height="80">
                        <div xmlns="http://www.w3.org/1999/xhtml" class="flex items-center justify-center w-full h-full">
                            <i data-lucide="${glyph}" style="color: ${sym.accent}; width: 42px; height: 42px; stroke-width: 1px; opacity: 0.8;"></i>
                        </div>
                    </foreignObject>

                    <circle cx="26" cy="26" r="4" fill="${sym.accent}" opacity="0.15"/>
                    <circle cx="134" cy="26" r="4" fill="${sym.accent}" opacity="0.15"/>
                    <circle cx="26" cy="234" r="4" fill="${sym.accent}" opacity="0.15"/>
                    <circle cx="134" cy="234" r="4" fill="${sym.accent}" opacity="0.15"/>
                    <line x1="40" y1="210" x2="120" y2="210" stroke="${sym.accent}" stroke-width="0.5" opacity="0.3"/>
                    <text x="80" y="228" text-anchor="middle" font-family="serif" font-size="6.5" fill="${sym.accent}" letter-spacing="2" opacity="0.5">${isReversed ? "REVERSED" : "UPRIGHT"}</text>
                </g>
            </svg>`;
        }
        window.onload = () => {
            if (!localStorage.getItem(KEY_NAME)) {
                document.getElementById('setup-view').classList.remove('hidden');
            } else {
                document.getElementById('main-view').classList.remove('hidden');
            }
        };

        function saveKey() {
            const val = document.getElementById('api-key').value.trim();
            if (val) { localStorage.setItem(KEY_NAME, val); location.reload(); }
        }

        function resetKey() {
            if (confirm('設定をリセットしますか？')) { localStorage.removeItem(KEY_NAME); location.reload(); }
        }

        function toggleFlip(el) { el.classList.toggle('flipped'); }

        async function fetchFortune() {
            const apiKey = localStorage.getItem(KEY_NAME);
            const idle = document.getElementById('idle-state');
            const loader = document.getElementById('loader');
            idle.classList.add('hidden');
            loader.classList.remove('hidden');
            const today = new Date().toLocaleDateString('ja-JP');
            const payload = {
                contents: [{ parts: [{ text: `
                    あなたは熟練の東洋占術師です。以下のデータを基に本日（${today}）の運勢を鑑定してください。
                    【相談者データ】${JSON.stringify(PROFILE)}
                    【指示】
                    ・簡潔に、かつ知的に回答せよ。過度な励ましや全肯定は不要。
                    ・今日をどういう気持ちで過ごすべきか、一言アドバイスを添えよ。
                    ・以下のJSON形式のみで出力せよ（余計な文章は一切含めないこと）。
                    {"score":0-100, "love":0-100, "work":0-100, "love_comment":"恋愛・対人運の解説(40字以内)", "work_comment":"仕事・金運の解説(40字以内)", "color":"色", "direction":"方位", "message":"今日の運勢一言(80字以内)", "advice":"過ごし方の助言(80字以内)"}
                ` }] }]
            };
            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
                const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                const resJson = await response.json();
                if (!response.ok) throw new Error(resJson.error ? resJson.error.message : "API通信エラー");
                const aiText = resJson.candidates[0].content.parts[0].text;
                const jsonMatch = aiText.match(/\{[\s\S]*\}/);
                render(JSON.parse(jsonMatch[0]));
            } catch (e) {
                console.error("Error:", e);
                alert(`鑑定エラー: ${e.message}\n\nAPIキーを確認して「Reset Key」から再入力してください。`);
                idle.classList.remove('hidden');
            } finally {
                loader.classList.add('hidden');
            }
        }

        function render(d) {
            document.getElementById('display-area').innerHTML = `
                <div class="bg-white p-10 rounded-[3.5rem] shadow-xl border border-stone-50 fade-in">
                    <div class="flex justify-between items-start mb-12">
                        <div class="serif text-7xl text-slate-900">${d.score}<span class="text-sm ml-1 opacity-30">/100</span></div>
                        <div class="flex flex-col gap-2 w-[48%]">
                            <div class="flip-card" onclick="toggleFlip(this)">
                                <div class="flip-card-inner">
                                    <div class="flip-card-front">
                                        <p class="text-[9px] text-stone-400 uppercase tracking-widest mb-1">Love</p>
                                        <p class="text-sm font-bold text-slate-700">${d.love}%</p>
                                        <span class="flip-hint">tap ↺</span>
                                    </div>
                                    <div class="flip-card-back">
                                        <p class="text-[9px] text-stone-400 uppercase tracking-widest mb-1">Love</p>
                                        <p class="text-[10px] text-stone-300 leading-relaxed text-center">${d.love_comment || '—'}</p>
                                    </div>
                                </div>
                            </div>
                            <div class="flip-card" onclick="toggleFlip(this)">
                                <div class="flip-card-inner">
                                    <div class="flip-card-front">
                                        <p class="text-[9px] text-stone-400 uppercase tracking-widest mb-1">Work</p>
                                        <p class="text-sm font-bold text-slate-700">${d.work}%</p>
                                        <span class="flip-hint">tap ↺</span>
                                    </div>
                                    <div class="flip-card-back">
                                        <p class="text-[9px] text-stone-400 uppercase tracking-widest mb-1">Work</p>
                                        <p class="text-[10px] text-stone-300 leading-relaxed text-center">${d.work_comment || '—'}</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="space-y-10">
                        <div class="text-sm leading-relaxed text-slate-600 serif pl-4 border-l border-stone-200">${d.message}</div>
                        <div class="grid grid-cols-2 gap-3">
                            <div class="bg-stone-50 p-4 rounded-2xl text-center">
                                <p class="text-[9px] text-stone-400 uppercase tracking-widest mb-1">Color</p>
                                <p class="font-bold text-xs">${d.color}</p>
                            </div>
                            <div class="bg-stone-50 p-4 rounded-2xl text-center">
                                <p class="text-[9px] text-stone-400 uppercase tracking-widest mb-1">Direction</p>
                                <p class="font-bold text-xs">${d.direction}</p>
                            </div>
                        </div>
                        <div class="pt-8 border-t border-stone-100">
                            <p class="text-[9px] text-stone-400 font-bold mb-3 uppercase tracking-[0.2em]">Mindset Advice</p>
                            <p class="text-sm font-bold text-slate-700 leading-relaxed">${d.advice}</p>
                        </div>
                    </div>
                    <div class="mt-10 text-center">
                        <button onclick="location.reload()" class="px-8 py-3 border border-stone-200 rounded-full text-[10px] tracking-widest uppercase text-stone-400 active:scale-95 transition">再鑑定する</button>
                    </div>
                </div>
            `;
        }

        async function drawTarot() {
            const apiKey = localStorage.getItem(KEY_NAME);
            const btn = document.getElementById('tarot-btn');
            const msgArea = document.getElementById('tarot-message');
            const inner = document.getElementById('tarot-inner');
            const faceContent = document.getElementById('tarot-face-content');

            btn.disabled = true;
            btn.textContent = '...';
            msgArea.innerHTML = `<p class="text-[9px] text-stone-300 tracking-[0.2em] uppercase animate-pulse">Reading the cards...</p>`;
            inner.classList.remove('revealed');

            const payload = {
                contents: [{ parts: [{ text: `
                    あなたは熟練のタロット占い師です。大アルカナ22枚から1枚を選び、正位置か逆位置かも決めてください。
                    以下のJSON形式のみで返せ。余計な解説は一切不要。
                    {"name":"カード名", "reversed":true/false, "meaning":"一言メッセージ", "icon":"Lucideのアイコン名"}
                    カード名は日本語で（愚者、魔術師、女教皇、女帝、皇帝、教皇、恋人、戦車、力、隠者、運命の輪、正義、吊られた男、死神、節制、悪魔、塔、星、月、太陽、審判、世界）
                ` }] }]
            };

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
                });
                const resJson = await response.json();
                const aiText = resJson.candidates[0].content.parts[0].text;
                const jsonMatch = aiText.match(/\{[\s\S]*\}/);
                const data = JSON.parse(jsonMatch[0]);

                // AIが選んだアイコン(data.icon)を優先して使うようにします
                faceContent.innerHTML = buildCardSVG(data.name, data.reversed, data.icon);
                lucide.createIcons();

                setTimeout(() => {
                    inner.classList.add('revealed');
                    setTimeout(() => {
                        const orientation = data.reversed ? '（逆位置）' : '（正位置）';
                        msgArea.innerHTML = `
                            <div class="fade-in">
                                <p class="cinzel text-[10px] text-stone-500 tracking-widest mb-2">${data.name} ${orientation}</p>
                                <p class="serif text-xs text-slate-600 leading-relaxed px-4">${data.meaning}</p>
                            </div>`;
                        btn.disabled = false;
                        btn.textContent = 'Draw Again';
                    }, 400);
                }, 300);

            } catch (e) {
                console.error(e);
                msgArea.innerHTML = `<p class="text-[9px] text-stone-300 uppercase">Connection Error</p>`;
                btn.disabled = false;
                btn.textContent = 'Draw';
            }
        }
    </script>
</body>
</html>
